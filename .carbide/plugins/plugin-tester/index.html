<!doctype html>
<html>
  <head>
    <title>Plugin Tester</title>
  </head>
  <body>
    <script>
      const rpc = {
        _pending: new Map(),
        send(method, ...params) {
          const id =
            Math.random().toString(36).substring(2) + Date.now().toString(36);
          window.parent.postMessage({ id, method, params }, "*");
          return new Promise((resolve, reject) => {
            this._pending.set(id, { resolve, reject });
            setTimeout(() => {
              if (this._pending.has(id)) {
                this._pending.delete(id);
                reject(new Error("RPC timeout: " + method));
              }
            }, 5000);
          });
        },
        _handle(data) {
          if (!data.id || !this._pending.has(data.id)) return;
          const { resolve, reject } = this._pending.get(data.id);
          this._pending.delete(data.id);
          if (data.error) reject(new Error(data.error));
          else resolve(data.result);
        },
      };

      window.addEventListener("message", (e) => {
        const data = e.data;

        // RPC responses
        rpc._handle(data);

        // Command execution
        if (data.method === "command.execute") {
          handle_command(data.params[0]);
        }

        // Event notifications
        if (data.type === "event") {
          handle_event(data);
        }

        // Lifecycle
        if (data.method === "lifecycle.activate") {
          console.log("[plugin-tester] activated");
        }
        if (data.method === "lifecycle.deactivate") {
          console.log("[plugin-tester] deactivating");
        }
      });

      let event_count = 0;

      function handle_event(data) {
        event_count++;
        update_status();
        console.log("[plugin-tester] event:", data.event, data.data);
      }

      async function update_status() {
        try {
          const text = await rpc.send("editor.get_value");
          const words = text.trim() ? text.trim().split(/\s+/).length : 0;
          const chars = text.length;
          await rpc.send(
            "ui.update_statusbar_item",
            "tester-status",
            `Tester: ${words}w ${chars}c | ${event_count} events`,
          );
        } catch {
          await rpc.send(
            "ui.update_statusbar_item",
            "tester-status",
            `Tester: no editor | ${event_count} events`,
          );
        }
      }

      async function handle_command(full_id) {
        const cmd = full_id.replace("plugin-tester:", "");

        switch (cmd) {
          case "test-insert": {
            const prefix =
              (await rpc.send("settings.get", "prefix")) ?? ">>>";
            const selection = await rpc.send("editor.get_selection");
            const text = selection
              ? `${prefix} ${selection}`
              : `${prefix} (no selection)`;
            await rpc.send("editor.replace_selection", text);
            await rpc.send("ui.show_notice", {
              message: "Inserted with prefix: " + prefix,
            });
            break;
          }

          case "test-read-editor": {
            const value = await rpc.send("editor.get_value");
            const lines = value.split("\n").length;
            const words = value.trim() ? value.trim().split(/\s+/).length : 0;
            await rpc.send("ui.show_notice", {
              message: `Editor: ${lines} lines, ${words} words, ${value.length} chars`,
            });
            break;
          }

          case "test-list-vault": {
            const files = await rpc.send("vault.list");
            await rpc.send("ui.show_notice", {
              message: `Vault: ${files.length} files`,
              duration: 5000,
            });
            console.log("[plugin-tester] vault files:", files);
            break;
          }

          case "test-read-vault": {
            const files = await rpc.send("vault.list");
            if (files.length === 0) {
              await rpc.send("ui.show_notice", {
                message: "No files in vault",
              });
              break;
            }
            const path = files[0];
            const content = await rpc.send("vault.read", path);
            const preview = content.substring(0, 100);
            await rpc.send("ui.show_notice", {
              message: `Read "${path}" (${content.length} chars): ${preview}...`,
              duration: 5000,
            });
            break;
          }

          case "test-settings": {
            const all = await rpc.send("settings.get_all");
            const prefix = await rpc.send("settings.get", "prefix");
            await rpc.send("ui.show_notice", {
              message: `prefix="${prefix}", all=${JSON.stringify(all)}`,
              duration: 5000,
            });
            break;
          }

          case "test-event-count": {
            await rpc.send("ui.show_notice", {
              message: `Events received so far: ${event_count}`,
            });
            break;
          }

          default:
            console.warn("[plugin-tester] unknown command:", full_id);
        }
      }

      async function init() {
        // Status bar
        await rpc.send("ui.add_statusbar_item", {
          id: "tester-status",
          priority: 50,
          initial_text: "Tester: ready",
        });

        // Commands
        const commands = [
          {
            id: "test-insert",
            label: "Tester: Insert with prefix",
            description: "Wraps selection (or inserts placeholder) with configured prefix",
            keywords: ["test", "insert", "plugin"],
          },
          {
            id: "test-read-editor",
            label: "Tester: Read editor stats",
            description: "Shows line/word/char counts from active editor",
            keywords: ["test", "editor", "read"],
          },
          {
            id: "test-list-vault",
            label: "Tester: List vault files",
            description: "Lists all files in the vault",
            keywords: ["test", "vault", "list"],
          },
          {
            id: "test-read-vault",
            label: "Tester: Read first vault file",
            description: "Reads and previews the first file in the vault",
            keywords: ["test", "vault", "read"],
          },
          {
            id: "test-settings",
            label: "Tester: Show settings",
            description: "Displays current plugin settings",
            keywords: ["test", "settings"],
          },
          {
            id: "test-event-count",
            label: "Tester: Show event count",
            description: "Shows how many events have been received",
            keywords: ["test", "events", "count"],
          },
        ];

        for (const cmd of commands) {
          await rpc.send("commands.register", cmd);
        }

        // Events
        await rpc.send("events.on", "active-file-changed", "on-file-change");
        await rpc.send("events.on", "file-modified", "on-file-modify");
        await rpc.send("events.on", "file-created", "on-file-create");
        await rpc.send("events.on", "file-deleted", "on-file-delete");

        update_status();
        console.log("[plugin-tester] initialized with 6 commands");
      }

      init();
    </script>
  </body>
</html>
