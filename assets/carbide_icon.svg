<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background depth -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0033" />
      <stop offset="100%" stop-color="#05000a" />
    </radialGradient>
    
    <!-- Bold Flame Gradient -->
    <radialGradient id="flameGrad" cx="50%" cy="75%" r="65%" fx="50%" fy="85%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="25%" stop-color="#0088ff" />
      <stop offset="60%" stop-color="#8000ff" />
      <stop offset="100%" stop-color="#400080" />
    </radialGradient>

    <!-- Outer Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Symbol Glow -->
    <filter id="symbolGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Background -->
  <rect width="512" height="512" rx="40" fill="url(#bgGrad)" />

  <!-- Simplified Bold Flame Shape -->
  <path d="M256 20 
           C 256 20 310 120 360 180 
           C 430 260 440 340 440 380 
           C 440 460 360 500 256 500 
           C 152 500 72 460 72 380 
           C 72 340 82 260 152 180 
           C 202 120 256 20 256 20 Z" 
        fill="url(#flameGrad)" 
        filter="url(#glow)" />

  <!-- Inner Flame Detail (Bright Core) -->
  <path d="M256 120 
           C 280 180 340 240 340 320 
           C 340 400 300 440 256 440 
           C 212 440 172 400 172 320 
           C 172 240 232 180 256 120 Z" 
        fill="#00ffff" opacity="0.3" filter="url(#glow)" />

  <!-- Symbols -->
  <g transform="translate(256, 320)" filter="url(#symbolGlow)">
    <!-- Bold 'Greater Than' symbol (>) -->
    <path d="M-80 -70 L 40 0 L -80 70" 
          stroke="#000" stroke-width="45" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M-80 -70 L 40 0 L -80 70" 
          stroke="#00ffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8" />
    
    <!-- Bold Asterisk (*) -->
    <g transform="translate(75, -90) scale(0.7) rotate(15)">
       <path d="M0 -60 L 0 60 M-52 -30 L 52 30 M-52 30 L 52 -30" 
             stroke="#000" stroke-width="38" stroke-linecap="round" />
       <path d="M0 -60 L 0 60 M-52 -30 L 52 30 M-52 30 L 52 -30" 
             stroke="#00ffff" stroke-width="6" stroke-linecap="round" opacity="0.8" />
    </g>
  </g>
</svg>
