<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="512" height="512" rx="120" fill="#0F172A"/>
    
    <!-- Amber Floor Glow -->
    <ellipse cx="256" cy="450" rx="160" ry="20" fill="url(#floor-glow)" filter="blur(15px)"/>

    <!-- Flame Ambient Glow -->
    <circle cx="256" cy="220" r="140" fill="url(#ambient-amber)" filter="blur(60px)" opacity="0.5"/>

    <!-- Flame Outer -->
    <path d="M256 40C256 40 120 180 135 280C150 380 362 380 377 280C392 180 256 40 256 40Z" fill="url(#flame-outer)" filter="drop-shadow(0 0 30px rgba(245, 158, 11, 0.6))"/>
    
    <!-- Flame Inner -->
    <path d="M256 90C256 90 170 200 180 270C190 340 322 340 332 270C342 200 256 90 256 90Z" fill="url(#flame-inner)"/>

    <!-- Markdown Symbols -->
    <g transform="translate(0, -20)">
        <path d="M190 180L250 220L190 260" fill="none" stroke="#0F172A" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
        <g transform="translate(310, 140) scale(1.2) rotate(15)">
            <path d="M0 -25L0 25M-22 -12L22 12M-22 12L22 -12" stroke="#0F172A" stroke-width="16" stroke-linecap="round"/>
        </g>
    </g>

    <!-- Base Structure -->
    <path d="M256 310V220" stroke="#451A03" stroke-width="10" stroke-linecap="round" fill="none"/>
    <rect x="140" y="420" width="232" height="30" rx="15" fill="url(#metal-grad)" stroke="#0F172A" stroke-width="4"/>
    <rect x="150" y="340" width="212" height="90" fill="url(#metal-grad)" stroke="#0F172A" stroke-width="4"/>
    <rect x="140" y="315" width="232" height="30" rx="15" fill="url(#metal-grad)" stroke="#0F172A" stroke-width="4"/>
    <rect x="180" y="300" width="152" height="20" rx="10" fill="url(#metal-grad)" stroke="#0F172A" stroke-width="4"/>
    <rect x="215" y="270" width="82" height="35" rx="10" fill="#451A03" stroke="#0F172A" stroke-width="4"/>

    <!-- Wire Cage (Front) -->
    <path d="M180 310V210M332 310V210M160 220H352" stroke="url(#cage-glow)" stroke-width="10" stroke-linecap="round" fill="none"/>

    <defs>
        <radialGradient id="floor-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 450) rotate(90) scale(20 160)">
            <stop stop-color="#F59E0B" stop-opacity="0.6"/>
            <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="ambient-amber" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 220) scale(140)">
            <stop stop-color="#FBBF24" stop-opacity="0.5"/>
            <stop offset="1" stop-color="#FBBF24" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="flame-outer" x1="256" y1="40" x2="256" y2="350" gradientUnits="userSpaceOnUse">
            <stop stop-color="#F59E0B"/>
            <stop offset="0.7" stop-color="#B45309"/>
            <stop offset="1" stop-color="#451A03"/>
        </linearGradient>
        <linearGradient id="flame-inner" x1="256" y1="90" x2="256" y2="320" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FEF3C7"/>
            <stop offset="0.8" stop-color="#FBBF24"/>
        </linearGradient>
        <linearGradient id="metal-grad" x1="150" y1="340" x2="362" y2="340" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#292524"/>
            <stop offset="0.15" stop-color="#78716C"/>
            <stop offset="0.4" stop-color="#292524"/>
            <stop offset="0.75" stop-color="#0F172A"/>
            <stop offset="0.9" stop-color="#44403C"/>
            <stop offset="1" stop-color="#0F172A"/>
        </linearGradient>
        <linearGradient id="cage-glow" x1="160" y1="220" x2="352" y2="220" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FBBF24"/>
            <stop offset="0.5" stop-color="#FFFBEB"/>
            <stop offset="1" stop-color="#FBBF24"/>
        </linearGradient>
    </defs>
</svg>