<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Carbide v4 — Obsidian</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Source+Serif+4:ital,wght@1,400;1,500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --sans: "Geist", system-ui, -apple-system, sans-serif;
    --mono: "Geist Mono", ui-monospace, Menlo, monospace;
    --serif: "Source Serif 4", Georgia, serif;

    --bg-deep: oklch(0.13 0.018 275);
    --bg-glow-1: oklch(0.35 0.12 280 / 0.3);
    --bg-glow-2: oklch(0.4 0.14 320 / 0.22);
    --grain: oklch(1 0 0 / 0.04);

    --glass: oklch(0.22 0.02 275 / 0.55);
    --glass-strong: oklch(0.24 0.022 275 / 0.7);
    --glass-deep: oklch(0.17 0.018 275 / 0.7);

    --edge: oklch(1 0 0 / 0.08);
    --edge-strong: oklch(1 0 0 / 0.16);

    --fg: oklch(0.96 0.008 280);
    --fg-2: oklch(0.76 0.012 280);
    --fg-3: oklch(0.56 0.015 280);

    --hover: oklch(1 0 0 / 0.04);

    --accent: oklch(0.78 0.19 285);
    --accent-2: oklch(0.78 0.2 325);
    --accent-soft: oklch(0.48 0.12 285);
    --accent-glow: oklch(0.78 0.22 285 / 0.5);
    --accent-ink: oklch(0.88 0.14 285);
    --on-accent: oklch(0.12 0.02 275);

    --add: oklch(0.78 0.15 160);
    --add-ink: oklch(0.88 0.13 160);
    --del: oklch(0.74 0.17 28);
    --del-ink: oklch(0.86 0.14 28);
    --warn: oklch(0.8 0.15 80);
    --dirty: oklch(0.78 0.17 45);

    --canvas: var(--bg-deep); --panel: var(--glass); --surface: var(--glass-strong);
    --hairline: var(--edge); --hairline-strong: var(--edge-strong);
  }
  html, body, #root { height: 100%; margin: 0; }
  body { background: var(--bg-deep); color: var(--fg); font-family: var(--sans); font-size: 13px; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  button { font-family: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  textarea { font-family: inherit; color: inherit; }
  ::selection { background: color-mix(in oklch, var(--accent) 30%, transparent); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: oklch(1 0 0 / 0.12); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }

  :root {
    --background: var(--bg-deep); --foreground: var(--fg);
    --muted-foreground: var(--fg-3);
    --border: var(--edge); --border-subtle: var(--edge); --border-strong: var(--edge-strong);
    --background-surface-2: var(--glass); --background-surface-3: var(--glass-deep);
    --popover: var(--glass-strong); --secondary: var(--glass);
    --teal-400: var(--accent-soft); --teal-500: var(--accent); --teal-600: var(--accent-ink); --teal-700: var(--accent-ink);
    --teal-50: color-mix(in oklch, var(--accent) 15%, transparent);
    --diff-add-bg: color-mix(in oklch, var(--add) 14%, transparent);
    --diff-add-fg: var(--add-ink);
    --diff-add-gutter: var(--add);
    --diff-del-bg: color-mix(in oklch, var(--del) 14%, transparent);
    --diff-del-fg: var(--del-ink);
    --diff-del-gutter: var(--del);
    --warning: var(--warn); --warning-bg: color-mix(in oklch, var(--warn) 14%, transparent);
    --warning-text-on-bg: var(--warn);
    --interactive: var(--accent); --interactive-bg: color-mix(in oklch, var(--accent) 20%, transparent);
    --accent-hover: var(--hover); --primary: var(--accent); --primary-foreground: var(--on-accent);
    --card: var(--glass-strong); --muted: var(--glass);
    --font-family-sans: var(--sans); --font-family-mono: var(--mono);
    --radius: 0.5rem;
    --shadow-xs: 0 1px 2px oklch(0 0 0 / 0.4);
    --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.4);
    --shadow-md: 0 4px 12px -2px oklch(0 0 0 / 0.4);
    --shadow-lg: 0 20px 40px -10px oklch(0 0 0 / 0.6);
  }

  .tweaks-panel {
    position: fixed; right: 16px; top: 56px; z-index: 9999;
    background: var(--glass-strong); backdrop-filter: blur(20px); color: var(--fg);
    border: 1px solid var(--edge-strong); border-radius: 12px;
    box-shadow: var(--shadow-lg); padding: 12px 14px; width: 248px; font-size: 12px;
  }
  .tweaks-panel h4 { margin: 0 0 10px; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); font-weight: 600; }
  .tweaks-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .tweaks-row label { color: var(--fg-3); }
  .tweaks-seg { display: inline-flex; background: var(--glass-deep); border-radius: 6px; padding: 2px; }
  .tweaks-seg button { font-size: 11px; padding: 3px 8px; border-radius: 4px; color: var(--fg-3); }
  .tweaks-seg button[data-on="true"] { background: var(--glass-strong); color: var(--fg); box-shadow: var(--shadow-xs); }
  .tweaks-switch { width: 30px; height: 18px; border-radius: 999px; background: var(--glass-deep); position: relative; transition: 120ms; border: 1px solid var(--edge); }
  .tweaks-switch[data-on="true"] { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
  .tweaks-switch::after { content:""; position:absolute; top:2px; left:2px; width:12px; height:12px; border-radius:999px; background: var(--glass-strong); transition: 120ms; }
  .tweaks-switch[data-on="true"]::after { left: 14px; background: var(--on-accent); }
</style>
</head>
<body>
  <div id="root"></div>
  <script>
    window.TWEAKS = /*EDITMODE-BEGIN*/{ "theme": "dark", "density": "compact", "aiCommit": true }/*EDITMODE-END*/;
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="../app/icons.jsx"></script>
  <script type="text/babel" src="../app/data.jsx"></script>
  <script type="text/babel">
    function StatusBadge({ kind }) {
      const map = {
        M: { bg: "var(--warning-bg)", fg: "var(--warn)", label: "M" },
        A: { bg: "var(--diff-add-bg)", fg: "var(--diff-add-fg)", label: "A" },
        D: { bg: "var(--diff-del-bg)", fg: "var(--diff-del-fg)", label: "D" },
        R: { bg: "color-mix(in oklch, var(--accent) 18%, transparent)", fg: "var(--accent-ink)", label: "R" },
      };
      const s = map[kind] || map.M;
      return <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 18, height: 18, borderRadius: 4, background: s.bg, color: s.fg, fontFamily: "var(--mono)", fontSize: 11, fontWeight: 700 }}>{s.label}</span>;
    }
    window.StatusBadge = StatusBadge;
  </script>
  <script type="text/babel" src="../app/diff.jsx"></script>
  <script type="text/babel" src="../app/tweaks.jsx"></script>
  <script type="text/babel" src="app4.jsx"></script>
</body>
</html>
