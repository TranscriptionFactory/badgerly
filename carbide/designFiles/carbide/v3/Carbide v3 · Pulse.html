<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Carbide v3 — Pulse</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Source+Serif+4:ital,wght@1,400;1,500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --sans: "Geist", system-ui, -apple-system, sans-serif;
    --mono: "Geist Mono", ui-monospace, Menlo, monospace;
    --serif: "Source Serif 4", Georgia, serif;

    --canvas: oklch(0.99 0.003 250);
    --canvas-2: oklch(0.975 0.004 250);
    --panel: oklch(0.97 0.005 250);
    --panel-2: oklch(0.955 0.007 250);
    --chrome: oklch(0.955 0.007 250);
    --surface: oklch(1 0 0);

    --fg: oklch(0.22 0.02 260);
    --fg-2: oklch(0.42 0.015 260);
    --fg-3: oklch(0.58 0.012 260);

    --hairline: oklch(0.91 0.008 250);
    --hairline-strong: oklch(0.84 0.01 250);
    --hover: oklch(0.94 0.012 250);

    --accent: oklch(0.58 0.19 275);
    --accent-2: oklch(0.62 0.2 310);
    --accent-soft: oklch(0.82 0.1 280);
    --accent-glow: oklch(0.65 0.22 280 / 0.55);
    --accent-bg: oklch(0.94 0.05 280);
    --accent-ink: oklch(0.4 0.18 280);
    --on-accent: oklch(0.99 0.01 280);

    --add: oklch(0.52 0.14 160);
    --add-ink: oklch(0.3 0.11 160);
    --del: oklch(0.55 0.17 28);
    --del-ink: oklch(0.38 0.15 28);
    --warn: oklch(0.7 0.15 75);
    --dirty: oklch(0.65 0.15 40);
  }
  [data-color-scheme="dark"] {
    --canvas: oklch(0.155 0.014 265);
    --canvas-2: oklch(0.18 0.015 265);
    --panel: oklch(0.17 0.016 265);
    --panel-2: oklch(0.2 0.018 265);
    --chrome: oklch(0.14 0.014 265);
    --surface: oklch(0.22 0.02 265);

    --fg: oklch(0.96 0.008 220);
    --fg-2: oklch(0.78 0.012 220);
    --fg-3: oklch(0.58 0.012 220);

    --hairline: oklch(0.27 0.016 265);
    --hairline-strong: oklch(0.36 0.02 265);
    --hover: oklch(0.25 0.02 265);

    --accent: oklch(0.78 0.19 285);
    --accent-2: oklch(0.78 0.2 320);
    --accent-soft: oklch(0.45 0.12 285);
    --accent-glow: oklch(0.78 0.22 285 / 0.55);
    --accent-bg: oklch(0.3 0.08 285);
    --accent-ink: oklch(0.9 0.14 285);
    --on-accent: oklch(0.1 0.015 265);
  }
  html, body, #root { height: 100%; margin: 0; }
  body { background: var(--canvas); color: var(--fg); font-family: var(--sans); font-size: 13px; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  button { font-family: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
  textarea { font-family: inherit; color: inherit; }
  ::selection { background: color-mix(in oklch, var(--accent) 30%, transparent); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--hairline-strong); border-radius: 4px; border: 2px solid var(--panel); }
  ::-webkit-scrollbar-track { background: transparent; }

  :root {
    --background: var(--canvas);
    --foreground: var(--fg);
    --muted-foreground: var(--fg-3);
    --border: var(--hairline);
    --border-subtle: var(--hairline);
    --border-strong: var(--hairline-strong);
    --background-surface-2: var(--panel);
    --background-surface-3: var(--panel-2);
    --popover: var(--surface);
    --secondary: var(--panel);
    --teal-400: var(--accent-soft); --teal-500: var(--accent); --teal-600: var(--accent-ink); --teal-700: var(--accent-ink);
    --diff-add-bg: color-mix(in oklch, var(--add) 14%, transparent);
    --diff-add-fg: var(--add-ink);
    --diff-add-gutter: var(--add);
    --diff-del-bg: color-mix(in oklch, var(--del) 14%, transparent);
    --diff-del-fg: var(--del-ink);
    --diff-del-gutter: var(--del);
    --warning: var(--warn);
    --warning-bg: color-mix(in oklch, var(--warn) 12%, transparent);
    --warning-text-on-bg: var(--warn);
    --interactive: var(--accent); --interactive-bg: var(--accent-bg);
    --accent-hover: var(--hover); --primary: var(--accent); --primary-foreground: var(--on-accent);
    --card: var(--surface); --muted: var(--panel);
    --font-family-sans: var(--sans); --font-family-mono: var(--mono);
    --radius: 0.5rem;
    --shadow-xs: 0 1px 2px oklch(0.2 0.02 260 / 0.05);
    --shadow-sm: 0 1px 3px oklch(0.2 0.02 260 / 0.08);
    --shadow-md: 0 4px 8px -2px oklch(0.2 0.02 260 / 0.1);
    --shadow-lg: 0 10px 20px -4px oklch(0.2 0.02 260 / 0.15);
  }

  .tweaks-panel {
    position: fixed; right: 16px; bottom: 16px; z-index: 9999;
    background: var(--surface); color: var(--fg);
    border: 1px solid var(--hairline-strong); border-radius: 10px;
    box-shadow: var(--shadow-lg); padding: 12px 14px; width: 248px; font-size: 12px;
  }
  .tweaks-panel h4 { margin: 0 0 10px; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); font-weight: 600; }
  .tweaks-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .tweaks-row label { color: var(--fg-3); }
  .tweaks-seg { display: inline-flex; background: var(--panel); border-radius: 6px; padding: 2px; }
  .tweaks-seg button { font-size: 11px; padding: 3px 8px; border-radius: 4px; color: var(--fg-3); }
  .tweaks-seg button[data-on="true"] { background: var(--surface); color: var(--fg); box-shadow: var(--shadow-xs); }
  .tweaks-switch { width: 30px; height: 18px; border-radius: 999px; background: var(--panel); position: relative; transition: 120ms; border: 1px solid var(--hairline); }
  .tweaks-switch[data-on="true"] { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
  .tweaks-switch::after { content:""; position:absolute; top:2px; left:2px; width:12px; height:12px; border-radius:999px; background: var(--surface); transition: 120ms; }
  .tweaks-switch[data-on="true"]::after { left: 14px; background: var(--on-accent); }
</style>
</head>
<body>
  <div id="root"></div>
  <script>
    window.TWEAKS = /*EDITMODE-BEGIN*/{ "theme": "light", "density": "compact", "aiCommit": true }/*EDITMODE-END*/;
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="../app/icons.jsx"></script>
  <script type="text/babel" src="../app/data.jsx"></script>
  <script type="text/babel">
    function StatusBadge({ kind }) {
      const map = {
        M: { bg: "var(--warning-bg)", fg: "var(--warn)", label: "M" },
        A: { bg: "var(--diff-add-bg)", fg: "var(--diff-add-fg)", label: "A" },
        D: { bg: "var(--diff-del-bg)", fg: "var(--diff-del-fg)", label: "D" },
        R: { bg: "var(--accent-bg)", fg: "var(--accent-ink)", label: "R" },
      };
      const s = map[kind] || map.M;
      return <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 18, height: 18, borderRadius: 4, background: s.bg, color: s.fg, fontFamily: "var(--mono)", fontSize: 11, fontWeight: 700 }}>{s.label}</span>;
    }
    window.StatusBadge = StatusBadge;
  </script>
  <script type="text/babel" src="../app/diff.jsx"></script>
  <script type="text/babel" src="../app/tweaks.jsx"></script>
  <script type="text/babel" src="app3.jsx"></script>
</body>
</html>
